[package]
name = "openergo-server"
version.workspace = true
edition = "2024"

[dependencies]
bachelor = { version = "0.0.7", features = ["stream", "sink"] }
bytes = "1"
clap = { version = "4", features = ["derive"] }
env_logger = "0.11"
evdev = { version = "0.13", features = ["tokio", "stream-trait"] }
futures = "0.3"
jiff = "0.2"
libc = "0.2"
log = "0.4"
postcard = { version = "1", features = ["alloc", "use-std"] }
rootcause = "0.12"
shared = { path = "../shared" }
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["rt", "net", "time"] }
toml = "0.8"
tokio-util = { version = "0.7", features = ["codec"] }
users = "0.11"
udev = "0.9.3"
